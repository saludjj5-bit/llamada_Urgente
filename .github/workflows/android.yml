name: Fabricar App Android
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with: { node-version: '20' }
      
      - name: Instalar y Compilar Web
        run: |
          npm install
          npm run build
          
      - name: Convertir a App Movil (Capacitor)
        run: |
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli
          npx cap init "Llamada Urgente" "com.emergencias.app" --web-dir dist
          npx cap add android
          npx cap sync android
          
      - name: Preparar JAVA
        uses: actions/setup-java@v3
        with: { java-version: '17', distribution: 'temurin' }
        
      - name: Construir archivo APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Entregar App Lista
        uses: actions/upload-artifact@v3
        with:
          name: Llamada-Urgente-App.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
