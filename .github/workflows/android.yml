name: Fabricar App Android
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: '20' }
      
      - name: Instalar y Compilar Web
        run: |
          npm install
          npm run build
          
      - name: Convertir a App Movil COE MC
        run: |
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli
          # Aquí cambiamos el nombre en el sistema a COE MC:
          npx cap init "COE MC" "com.emergencias.app" --web-dir dist
          npx cap add android
          
      - name: Generar Icono Rojo Inteligente
        run: |
          npm install -D @capacitor/assets
          mkdir -p assets
          # Dibujar y recortar el icono rojo y fondo de lanzamiento
          echo '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024"><rect width="1024" height="1024" fill="#D00000"/><text x="512" y="550" font-family="sans-serif" font-size="200" font-weight="bold" fill="white" text-anchor="middle">COE MC</text></svg>' > assets/icon.svg
          echo '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2732 2732"><rect width="2732" height="2732" fill="#D00000"/><text x="1366" y="1400" font-family="sans-serif" font-size="300" font-weight="bold" fill="white" text-anchor="middle">COE MC</text></svg>' > assets/splash.svg
          npx capacitor-assets generate --android
          npx cap sync android
          
      - name: Preparar JAVA
        uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }

      - name: Arreglar conflicto de Kotlin
        run: |
          echo "subprojects { configurations.configureEach { exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'; exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8' } }" >> android/build.gradle
          
      - name: Construir archivo APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Entregar App Lista
        uses: actions/upload-artifact@v4
        with:
          name: COE-MC-App.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
